<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Password Generator</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>

  <header class="header">
    <img src="icons/icon48.png" alt="Password Generator" class="logo">
    <h1>Password Generator</h1>
  </header>

  <section class="card">
    <div class="label-row">
      <span class="label">Lunghezza</span>
    </div>
    <p class="sublabel">Numero di caratteri</p>

    <div class="chip-row" id="chipRow">
      <button class="chip" data-len="8">8</button>
      <button class="chip" data-len="10">10</button>
      <button class="chip" data-len="12">12</button>
      <button class="chip" data-len="16">16</button>
      <button class="chip" data-len="20">20</button>
    </div>

    <div class="divider"></div>

    <div class="switch-row">
      <div>
        <span class="label">CARATTERI SPECIALI</span>
        <p class="sublabel">Opzionale &middot; !?%@#$&amp;*+-=</p>
      </div>
      <label class="switch">
        <input type="checkbox" id="specialToggle">
        <span class="slider"></span>
      </label>
    </div>
  </section>

  <section class="result-wrap">
    <span class="label">PASSWORD GENERATA</span>

    <div class="result-box">
      <span id="passwordOutput" class="password-text"></span>
      <div class="result-actions">
        <button id="copyBtn" class="icon-btn" title="Copia" aria-label="Copia password">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="11" height="11" rx="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
        <button id="regenBtn" class="icon-btn icon-btn-accent" title="Genera nuova password" aria-label="Genera nuova password">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-3.2-6.9"></path>
            <polyline points="21 3 21 9 15 9"></polyline>
          </svg>
        </button>
      </div>
    </div>

    <div class="strength-track">
      <div id="strengthBar" class="strength-fill"></div>
    </div>

    <div class="info-row">
      <span id="strengthLabel" class="strength-label"></span>
      <span id="lengthLabel" class="length-label"></span>
    </div>

    <p id="copyFeedback" class="copy-feedback"></p>
  </section>

  <footer class="footer">
    <span class="footer-credit">Sviluppato da <a href="https://melisdevops.it" target="_blank" rel="noopener" class="footer-link" >Marcello Mario Melis</a></span>
    <span class="footer-donate">
      <a href="https://buymeacoffee.com/marcellomelis" target="_blank" rel="noopener" class="donate-link">
        ❤️ Donami un caffè
      </a>
    </span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
